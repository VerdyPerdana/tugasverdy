<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priority Task - Google Sheets Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .quadrant { min-height: 200px; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); z-index: 999; justify-content: center; items-center: center; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <div id="loader" class="loading-overlay flex flex-col">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-700 mb-2"></div>
        <p class="font-bold text-indigo-700">Menyinkronkan ke Spreadsheet...</p>
    </div>

    <div class="max-w-6xl mx-auto p-6">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-indigo-700">My Priority Manager</h1>
            <p class="text-gray-500 mt-2">Sinkronisasi Otomatis dengan Google Sheets</p>
        </header>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-10 border border-gray-100">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="taskInput" placeholder="Nama tugas..." class="p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400">
                <input type="date" id="dateInput" class="p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400">
                <select id="priorityInput" class="p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400">
                    <option value="1">Mendesak & Penting</option>
                    <option value="2">Penting (Jadwalkan)</option>
                    <option value="3">Mendesak (Delegasi)</option>
                    <option value="4">Kurang Penting</option>
                </select>
                <button onclick="addTask()" class="bg-indigo-600 text-white p-3 rounded-xl hover:bg-indigo-700 transition font-bold">
                    <i class="fas fa-plus mr-2"></i>Tambah
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="bg-red-50 p-4 rounded-2xl border-l-8 border-red-500"><h2 class="font-bold text-red-700 mb-4 italic">Q1: KERJAKAN SEKARANG</h2><div id="q-1" class="quadrant space-y-3"></div></div>
            <div class="bg-blue-50 p-4 rounded-2xl border-l-8 border-blue-500"><h2 class="font-bold text-blue-700 mb-4 italic">Q2: JADWALKAN</h2><div id="q-2" class="quadrant space-y-3"></div></div>
            <div class="bg-yellow-50 p-4 rounded-2xl border-l-8 border-yellow-500"><h2 class="font-bold text-yellow-700 mb-4 italic">Q3: DELEGASIKAN</h2><div id="q-3" class="quadrant space-y-3"></div></div>
            <div class="bg-gray-100 p-4 rounded-2xl border-l-8 border-gray-400"><h2 class="font-bold text-gray-600 mb-4 italic">Q4: ELIMINASI</h2><div id="q-4" class="quadrant space-y-3"></div></div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="font-bold text-gray-700 mb-4 flex items-center"><i class="fas fa-history mr-2 text-green-500"></i> Riwayat Selesai</h2>
            <div id="history" class="space-y-2"></div>
        </div>
    </div>

    <script>
        // GANTI LINK DI BAWAH INI DENGAN LINK YANG KAMU SALIN
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzPQLKoav5xpffecS0t2GP9WLni7wQBzN02hfz_0Y8y0wOI9uz0w1lznO4MG3RqVZjZ/exec";

        let tasks = JSON.parse(localStorage.getItem('myTasks')) || [];

        async function syncWithSheets(data) {
            document.getElementById('loader').style.display = 'flex';
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Penting untuk Google Apps Script
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            } catch (e) {
                console.error("Gagal sinkron:", e);
            }
            document.getElementById('loader').style.display = 'none';
        }

        function addTask() {
            const name = document.getElementById('taskInput').value;
            const date = document.getElementById('dateInput').value;
            const priority = document.getElementById('priorityInput').value;

            if (!name || !date) return alert("Isi data dengan lengkap!");

            const newTask = {
                action: 'add',
                id: Date.now(),
                name: name,
                date: date,
                priority: priority
            };

            // Simpan ke lokal dulu (supaya cepat)
            tasks.push({...newTask, completed: false});
            localStorage.setItem('myTasks', JSON.stringify(tasks));
            
            // Kirim ke Google Sheets
            syncWithSheets(newTask);
            
            document.getElementById('taskInput').value = '';
            renderTasks();
        }

        function toggleTask(id) {
            tasks = tasks.map(t => {
                if(t.id === id) {
                    t.completed = !t.completed;
                    t.completedDate = t.completed ? new Date().toLocaleDateString('id-ID') : null;
                }
                return t;
            });
            localStorage.setItem('myTasks', JSON.stringify(tasks));
            renderTasks();
        }

        function renderTasks() {
            [1, 2, 3, 4].forEach(i => document.getElementById(`q-${i}`).innerHTML = '');
            document.getElementById('history').innerHTML = '';

            tasks.forEach(task => {
                const html = `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center">
                        <div>
                            <p class="font-semibold ${task.completed ? 'line-through text-gray-400' : ''}">${task.name}</p>
                            <p class="text-xs text-gray-400">Deadline: ${task.date}</p>
                        </div>
                        <button onclick="toggleTask(${task.id})" class="text-green-500 p-2"><i class="fas fa-check"></i></button>
                    </div>`;
                
                if (task.completed) {
                    document.getElementById('history').innerHTML += html;
                } else {
                    document.getElementById(`q-${task.priority}`).innerHTML += html;
                }
            });
        }

        renderTasks();
    </script>
</body>
</html>
